name: Publish to npm

on:
  push:
    branches: [main]

# Allow only one publish run at a time; don't cancel an in-flight publish.
concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) needs a recent npm CLI.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - name: Check if version already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION already on npm — skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Publishing $NAME@$VERSION."
          fi

      - name: Publish
        if: steps.check.outputs.exists == 'false'
        run: npm publish --provenance --access public
